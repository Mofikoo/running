name: Garmin → Supabase Sync

on:
  schedule:
    # Tourne à 8h00 et 20h00 (UTC) tous les jours
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Nombre de jours à importer (défaut: 7, premier run: 30)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install garminconnect requests

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          DAYS_BACK:       ${{ github.event.inputs.days_back || '7' }}
        run: python sync_garmin.py
